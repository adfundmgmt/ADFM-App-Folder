name: Apply monthly returns heatmap

on:
  push:
    branches:
      - feature/monthly-returns-heatmap
    paths:
      - adfm_core/monthly_returns_matrix.py
      - .github/workflows/apply_monthly_returns_heatmap.yml

permissions:
  contents: write

jobs:
  patch-page:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/monthly-returns-heatmap
          fetch-depth: 0

      - name: Wire renderer into Monthly Seasonality Explorer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("pages/8_Monthly_Seasonality_Explorer.py")
          text = path.read_text(encoding="utf-8")

          import_line = "from adfm_core.monthly_returns_matrix import render_monthly_returns_lens\n"
          import_anchor = "from adfm_core.ui import render_footer\n"
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit("Import anchor not found")
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          render_block = '''\n\n# =========================\n# MONTHLY RETURNS MATRIX\n# =========================\n\nrender_monthly_returns_lens(\n    all_months=filter_table,\n    filtered_months=filtered,\n    stats=stats,\n    symbol=used_symbol,\n    as_of=prices.index.max(),\n)\n'''
          render_anchor = '''if stats.dropna(subset=["mean_h1", "mean_h2"]).empty:\n    st.error("Insufficient data in the selected filtered window to compute statistics.")\n    st.stop()\n'''
          if "render_monthly_returns_lens(" not in text:
              if render_anchor not in text:
                  raise SystemExit("Render anchor not found")
              text = text.replace(render_anchor, render_anchor + render_block, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit patched page
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply_monthly_returns_heatmap.yml
          git config user.name "adfm-ui-bot"
          git config user.email "adfm-ui-bot@users.noreply.github.com"
          git add pages/8_Monthly_Seasonality_Explorer.py .github/workflows/apply_monthly_returns_heatmap.yml
          git commit -m "feat: integrate monthly returns matrix [skip ci]"
          git push origin HEAD:feature/monthly-returns-heatmap
