name: Patch monthly matrix lint

on:
  push:
    branches:
      - feature/monthly-returns-heatmap
    paths:
      - .github/workflows/patch_monthly_matrix_lint.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/monthly-returns-heatmap
          fetch-depth: 0

      - name: Make zip length explicit
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("adfm_core/monthly_returns_matrix.py")
          text = path.read_text(encoding="utf-8")
          old = "for px, py in zip(x, y))"
          new = "for px, py in zip(x, y, strict=True))"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("zip anchor not found")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit lint fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/patch_monthly_matrix_lint.yml
          git config user.name "adfm-ui-bot"
          git config user.email "adfm-ui-bot@users.noreply.github.com"
          git add adfm_core/monthly_returns_matrix.py .github/workflows/patch_monthly_matrix_lint.yml
          git commit -m "fix: satisfy strict zip lint [skip ci]"
          git push origin HEAD:feature/monthly-returns-heatmap
