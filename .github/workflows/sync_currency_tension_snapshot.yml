name: Sync currency tension snapshot

on:
  schedule:
    - cron: "15 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-currency-tension-snapshot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download latest analyst snapshot
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://raw.githubusercontent.com/smileys21/currency_tension_tool-main/main/data/cache"
          files=(
            carry_grid_nominal.parquet
            carry_grid_real.parquet
            commentary.md
            commentary_meta.json
            overlays.parquet
            pillar_scores.parquet
            snapshot_history.parquet
            pillar_history.parquet
            carry_history.parquet
            pos_history.parquet
            overlay_history.parquet
            tension_map.parquet
            tension_map_prev.parquet
            warnings.json
            yields.parquet
          )

          mkdir -p data/cache
          for file in "${files[@]}"; do
            tmp="data/cache/.${file}.tmp"
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 2 \
              --connect-timeout 15 \
              --max-time 120 \
              "$base_url/$file" \
              --output "$tmp"
            test -s "$tmp"
            mv "$tmp" "data/cache/$file"
          done

      - name: Commit snapshot changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "cte-sync-bot"
          git config user.email "cte-sync-bot@users.noreply.github.com"
          # Runtime cache files are ignored by default. This scheduled snapshot
          # is the controlled exception, so force-stage the curated files.
          git add -f -- data/cache

          if git diff --cached --quiet; then
            echo "Currency tension snapshot is already current."
            exit 0
          fi

          git commit -m "chore: sync currency tension snapshot [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Unable to push snapshot after 3 attempts."
              exit 1
            fi

            echo "Push raced with another main-branch update; rebasing and retrying ($attempt/3)."
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done

