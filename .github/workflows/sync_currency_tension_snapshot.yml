name: Sync currency tension snapshot

on:
  schedule:
    - cron: "15 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download latest analyst snapshot
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://raw.githubusercontent.com/smileys21/currency_tension_tool-main/main/data/cache"
          files=(
            carry_grid_nominal.parquet
            carry_grid_real.parquet
            commentary.md
            commentary_meta.json
            overlays.parquet
            pillar_scores.parquet
            snapshot_history.parquet
            pillar_history.parquet
            carry_history.parquet
            pos_history.parquet
            overlay_history.parquet
            tension_map.parquet
            tension_map_prev.parquet
            warnings.json
            yields.parquet
          )

          mkdir -p data/cache
          for file in "${files[@]}"; do
            curl --fail --silent --show-error --location \
              "$base_url/$file" \
              --output "data/cache/$file"
          done

      - name: Commit snapshot changes
        shell: bash
        run: |
          git config user.name "cte-sync-bot"
          git config user.email "cte-sync-bot@users.noreply.github.com"
          git add data/cache
          if git diff --cached --quiet; then
            echo "Currency tension snapshot is already current."
          else
            git commit -m "chore: sync currency tension snapshot [skip ci]"
            git push
          fi

