name: Apply monthly seasonality cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: "!contains(github.event.head_commit.message, 'fix: attach monthly returns and remove 3D terrain')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update Monthly Seasonality Explorer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          page = Path("pages/8_Monthly_Seasonality_Explorer.py")
          text = page.read_text(encoding="utf-8")
          text = text.replace("import plotly.graph_objects as go\n", "")

          text, function_blocks = re.subn(
              r"\n# =========================\n# 3D SEASONAL WATERFALL TERRAIN\n# =========================\n.*?\n# =========================\n# MAIN CONTROLS\n# =========================",
              "\n# =========================\n# MAIN CONTROLS\n# =========================",
              text,
              flags=re.S,
          )
          if function_blocks != 1:
              raise RuntimeError(f"Expected one 3D function block, removed {function_blocks}")

          text, output_blocks = re.subn(
              r"\n# =========================\n# NEW OUTPUT 3\n# =========================\n.*?\n# =========================\n# AUDIT\n# =========================",
              "\n# =========================\n# AUDIT\n# =========================",
              text,
              flags=re.S,
          )
          if output_blocks != 1:
              raise RuntimeError(f"Expected one 3D output block, removed {output_blocks}")

          required = """render_monthly_returns_lens(
    all_months=filter_table,
    filtered_months=filtered,
    stats=stats,
    symbol=used_symbol,
    as_of=prices.index.max(),
)
"""
          if required not in text:
              raise RuntimeError("Monthly Returns renderer is not attached to the Monthly Seasonality Explorer tab")

          page.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/apply_monthly_seasonality_cleanup.yml

      - name: Validate page
        shell: bash
        run: |
          python -m compileall -q pages/8_Monthly_Seasonality_Explorer.py adfm_core/monthly_returns_matrix.py
          python -m unittest tests.test_monthly_returns_matrix -v
          ! grep -q "3D Seasonal Waterfall Terrain" pages/8_Monthly_Seasonality_Explorer.py
          grep -q "render_monthly_returns_lens" pages/8_Monthly_Seasonality_Explorer.py

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "adfm-app-bot"
          git config user.email "adfm-app-bot@users.noreply.github.com"
          git add pages/8_Monthly_Seasonality_Explorer.py .github/workflows/apply_monthly_seasonality_cleanup.yml
          git commit -m "fix: attach monthly returns and remove 3D terrain"
          git push origin HEAD:main
