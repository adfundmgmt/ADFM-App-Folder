name: Extend monthly returns fetch window

on:
  push:
    branches:
      - feature/monthly-returns-heatmap
    paths:
      - .github/workflows/apply_monthly_returns_fetch_window.yml

permissions:
  contents: write

jobs:
  patch-page:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/monthly-returns-heatmap
          fetch-depth: 0

      - name: Extend history for the 20Y matrix view
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("pages/8_Monthly_Seasonality_Explorer.py")
          text = path.read_text(encoding="utf-8")
          old = 'start_fetch_date = f"{int(custom_start_year) - 2}-01-01"\n'
          new = (
              'matrix_floor_year = this_year - 21\n'
              'start_fetch_year = min(int(custom_start_year) - 2, matrix_floor_year)\n'
              'start_fetch_date = f"{start_fetch_year}-01-01"\n'
          )
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("Fetch-window anchor not found")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit fetch-window change
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply_monthly_returns_fetch_window.yml
          git config user.name "adfm-ui-bot"
          git config user.email "adfm-ui-bot@users.noreply.github.com"
          git add pages/8_Monthly_Seasonality_Explorer.py .github/workflows/apply_monthly_returns_fetch_window.yml
          git commit -m "fix: load enough history for 20Y return matrix [skip ci]"
          git push origin HEAD:feature/monthly-returns-heatmap
