name: Application checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Compile, test, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile application sources
        run: python -m compileall -q Home.py pages adfm_core adfm_momentum_scanner.py adfm_sector_rotation_config.py tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Lint shared code and tests
        run: ruff check --select E,F,I,B --ignore E501 adfm_core tests
